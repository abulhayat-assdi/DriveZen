services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      # Bound to localhost only — lets you run `npx prisma studio` or `psql`
      # from the VPS itself without exposing Postgres to the internet.
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # One-shot job: applies Prisma migrations, then exits. `app` waits for it to
  # finish successfully before starting, so the schema is always up to date.
  migrate:
    build:
      context: .
      target: builder
    command: ["npx", "prisma", "migrate", "deploy"]
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
    depends_on:
      db:
        condition: service_healthy

  # Not started by `docker compose up`. Run once after the first deploy with:
  #   docker compose --profile tools run --rm seed
  seed:
    build:
      context: .
      target: builder
    command: ["npx", "tsx", "prisma/seed.ts"]
    profiles: ["tools"]
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@drivezen.com}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin123}
    depends_on:
      db:
        condition: service_healthy

  # Repoints every image slot at the photo set committed under public/seed/.
  # Safe on a live database — it only rewrites image URLs, never orders.
  #   docker compose --profile tools run --rm set-images
  set-images:
    build:
      context: .
      target: builder
    command: ["npx", "tsx", "prisma/set-images.ts"]
    profiles: ["tools"]
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
    depends_on:
      db:
        condition: service_healthy

  app:
    build:
      context: .
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      AUTH_SECRET: ${AUTH_SECRET}
    ports:
      - "${APP_PORT:-3000}:3000"
    volumes:
      # Uploaded product images live on the VPS disk, outside the container,
      # so they survive rebuilds/redeploys. Same host directory as before —
      # only the path inside the container moved out of ./public, so existing
      # uploads keep working.
      - ./data/uploads:/app/data/uploads
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

volumes:
  pgdata:
